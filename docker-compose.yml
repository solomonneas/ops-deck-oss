services:
  ui:
    build:
      context: ./ui
    ports:
      - "${UI_PORT:-5173}:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8005}
      VITE_PROMPT_LIBRARY_BASE_URL: ${VITE_PROMPT_LIBRARY_BASE_URL:-http://localhost:5202}
      VITE_CODE_SEARCH_BASE_URL: ${VITE_CODE_SEARCH_BASE_URL:-http://localhost:5204}
    depends_on:
      api:
        condition: service_healthy
      prompt-library:
        condition: service_healthy
      code-search:
        condition: service_healthy

  api:
    build:
      context: ./api
    ports:
      - "${API_PORT:-8005}:8005"
    environment:
      PORT: ${API_PORT:-8005}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8005/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  prompt-library:
    build:
      context: ./prompt-library
    ports:
      - "${PROMPT_LIBRARY_PORT:-5202}:5202"
    environment:
      PORT: ${PROMPT_LIBRARY_PORT:-5202}
      DATA_DIR: /app/data/runtime
    volumes:
      - prompt-library-data:/app/data/runtime
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5202/api/prompts').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  code-search:
    build:
      context: ./code-search
    ports:
      - "${CODE_SEARCH_PORT:-5204}:5204"
    environment:
      PORT: ${CODE_SEARCH_PORT:-5204}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3-embedding:8b}
      CODE_SEARCH_DB_PATH: /app/data/runtime/code_search.db
      CODE_SEARCH_CORPUS_DIR: /app/data/corpus
    depends_on:
      ollama:
        condition: service_started
    volumes:
      - code-search-data:/app/data/runtime
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; exit(0 if urllib.request.urlopen('http://127.0.0.1:5204/api/health').status == 200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  prompt-library-data:
  code-search-data:
  ollama-data:

